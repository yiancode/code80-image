name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/code80-image
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugins/code80-image/package-lock.json
      - run: npm ci
      - run: npm run check
